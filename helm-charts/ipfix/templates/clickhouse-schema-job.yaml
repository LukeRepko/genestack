{{- if .Values.ipfix.clickhouse.initSchema.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: ipfix-clickhouse-schema-init
  namespace: {{ .Values.ipfix.namespace }}
  labels:
    app: ipfix-schema-init
  annotations:
    # Helm hooks to run after install/upgrade
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: ipfix-schema-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init-schema
        image: {{ .Values.ipfix.clickhouse.initSchema.image }}
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "=== IPFIX ClickHouse Schema Initialization ==="
          echo "ClickHouse host: {{ .Values.ipfix.clickhouse.initSchema.host }}"
          echo "Cluster name: {{ .Values.ipfix.clickhouse.clusterName }}"
          
          echo "Waiting for ClickHouse to be ready..."
          until clickhouse-client --host {{ .Values.ipfix.clickhouse.initSchema.host }} --query "SELECT 1" 2>/dev/null; do
            echo "ClickHouse not ready, waiting 5s..."
            sleep 5
          done
          echo "ClickHouse is ready!"
          
          echo "Initializing IPFIX schema..."
          clickhouse-client \
            --host {{ .Values.ipfix.clickhouse.initSchema.host }} \
            --user {{ .Values.ipfix.clickhouse.initSchema.user }} \
            --password "$CLICKHOUSE_PASSWORD" \
            --multiquery <<'EOSQL'
          
          CREATE DATABASE IF NOT EXISTS {{ .Values.ipfix.clickhouse.database }} ON CLUSTER '{{ .Values.ipfix.clickhouse.clusterName }}';

          ----------------------------------------------------------------------
          -- Replicated VIP hourly schema (per-node aggregates from rollup.py)
          ----------------------------------------------------------------------
          CREATE TABLE IF NOT EXISTS {{ .Values.ipfix.clickhouse.database }}.{{ .Values.ipfix.clickhouse.table }} ON CLUSTER '{{ .Values.ipfix.clickhouse.clusterName }}'
          (
            hour_ts   DateTime,
            vip       LowCardinality(String),
            dir       LowCardinality(String),
            bytes     UInt64,
            packets   UInt64,
            node      LowCardinality(String)
          )
          ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{shard}/{{ .Values.ipfix.clickhouse.table }}','{replica}')
          PARTITION BY toYYYYMMDD(hour_ts)
          ORDER BY (hour_ts, vip, dir, node);

          -- Materialized view target for cross-node aggregation
          CREATE TABLE IF NOT EXISTS {{ .Values.ipfix.clickhouse.database }}.vip_hourly_mv ON CLUSTER '{{ .Values.ipfix.clickhouse.clusterName }}'
          (
            hour_ts   DateTime,
            vip       LowCardinality(String),
            dir       LowCardinality(String),
            bytes     UInt64,
            packets   UInt64
          )
          ENGINE = ReplicatedSummingMergeTree('/clickhouse/tables/{shard}/vip_hourly_mv','{replica}')
          PARTITION BY toYYYYMMDD(hour_ts)
          ORDER BY (hour_ts, vip, dir);

          -- MV to aggregate across nodes
          CREATE MATERIALIZED VIEW IF NOT EXISTS {{ .Values.ipfix.clickhouse.database }}.vip_hourly_mv__mv ON CLUSTER '{{ .Values.ipfix.clickhouse.clusterName }}'
          TO {{ .Values.ipfix.clickhouse.database }}.vip_hourly_mv
          AS
          SELECT
            hour_ts,
            vip,
            dir,
            sum(bytes)   AS bytes,
            sum(packets) AS packets
          FROM {{ .Values.ipfix.clickhouse.database }}.{{ .Values.ipfix.clickhouse.table }}
          GROUP BY hour_ts, vip, dir;

          ----------------------------------------------------------------------
          -- Replicated raw flows + distributed table
          ----------------------------------------------------------------------
          CREATE TABLE IF NOT EXISTS {{ .Values.ipfix.clickhouse.database }}.flows_local ON CLUSTER '{{ .Values.ipfix.clickhouse.clusterName }}'
          (
            flow_start   DateTime64(3),
            flow_end     DateTime64(3),
            fip          IPv6,
            src_ip       IPv6,
            dst_ip       IPv6,
            src_port     UInt16,
            dst_port     UInt16,
            proto        UInt8,
            bytes        UInt64,
            packets      UInt64,
            exporter_id  LowCardinality(String)
          )
          ENGINE = ReplicatedMergeTree('/clickhouse/tables/{shard}/flows_local','{replica}')
          PARTITION BY toDate(flow_start)
          ORDER BY (fip, flow_start, src_ip, dst_ip, src_port, dst_port, proto)
          SETTINGS index_granularity = 8192;

          CREATE TABLE IF NOT EXISTS {{ .Values.ipfix.clickhouse.database }}.flows_dist ON CLUSTER '{{ .Values.ipfix.clickhouse.clusterName }}'
          AS {{ .Values.ipfix.clickhouse.database }}.flows_local
          ENGINE = Distributed('{{ .Values.ipfix.clickhouse.clusterName }}', '{{ .Values.ipfix.clickhouse.database }}', 'flows_local', cityHash64(fip))
          SETTINGS internal_replication = 1;

          -- Hourly rollup by FIP
          CREATE TABLE IF NOT EXISTS {{ .Values.ipfix.clickhouse.database }}.flows_by_fip_1h ON CLUSTER '{{ .Values.ipfix.clickhouse.clusterName }}'
          (
            ts       DateTime,
            fip      IPv6,
            bytes    UInt64,
            packets  UInt64
          )
          ENGINE = SummingMergeTree
          PARTITION BY toDate(ts)
          ORDER BY (fip, ts);

          CREATE MATERIALIZED VIEW IF NOT EXISTS {{ .Values.ipfix.clickhouse.database }}.mv_flows_by_fip_1h ON CLUSTER '{{ .Values.ipfix.clickhouse.clusterName }}'
          TO {{ .Values.ipfix.clickhouse.database }}.flows_by_fip_1h
          AS
          SELECT
            toStartOfHour(flow_start) AS ts,
            fip,
            sum(bytes)   AS bytes,
            sum(packets) AS packets
          FROM {{ .Values.ipfix.clickhouse.database }}.flows_local
          GROUP BY ts, fip;

          EOSQL
          
          echo ""
          echo "=== Schema initialization complete! ==="
          echo "Verifying tables in {{ .Values.ipfix.clickhouse.database }} database..."
          clickhouse-client \
            --host {{ .Values.ipfix.clickhouse.initSchema.host }} \
            --user {{ .Values.ipfix.clickhouse.initSchema.user }} \
            --password "$CLICKHOUSE_PASSWORD" \
            --query "SHOW TABLES FROM {{ .Values.ipfix.clickhouse.database }}"
          echo ""
          echo "Done!"
        env:
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.ipfix.clickhouse.secretName }}
              key: password
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
{{- end }}
