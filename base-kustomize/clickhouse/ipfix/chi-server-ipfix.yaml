apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: server
  namespace: clickhouse
spec:
  configuration:
    # Keeper for replication in this overlay
    zookeeper:
      nodes:
        - host: keeper-keeper
          port: 2181

    # Override cluster layout to 3 shards × 2 replicas
    clusters:
      - name: ipfix
        layout:
          shardsCount: 3
          replicasCount: 2
        templates:
          podTemplate: ch-pod
          volumeClaimTemplate: ch-data

    # NOTE: Schema initialization (database, tables) is handled by the IPFIX
    # install script, not here. This keeps ClickHouse generic and lets IPFIX
    # own its schema requirements.

  templates:
    podTemplates:
      - name: ch-pod
        spec:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: In
                    values:
                    - worker

          # Prefer spreading across nodes cluster-wide
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        clickhouse.altinity.com/chi: server
                    topologyKey: kubernetes.io/hostname

          containers:
            - name: clickhouse
              image: ${CLICKHOUSE_SERVER_IMAGE}
              imagePullPolicy: IfNotPresent
              ports:
                - name: http
                  containerPort: 8123
                - name: native
                  containerPort: 9000
                - name: inter
                  containerPort: 9009

    volumeClaimTemplates:
      - name: ch-data
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: general
          resources:
            requests:
              storage: 10Gi
